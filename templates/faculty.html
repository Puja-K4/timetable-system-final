{% extends "base.html" %} {% block content %}

<h2>Manage Faculty</h2>

<!-- 🔹 ADD FACULTY -->
<form method="POST">
  <input name="name" placeholder="Faculty Name" />
  <button>Add</button>
</form>

<br />


<table class="table table-bordered table-striped mt-4">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for f in data %}
        <tr>
            <td>{{ f.name }}</td>
            <td>
                <a href="/admin/delete-faculty/{{ f.id }}" class="btn btn-sm btn-danger">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br />
<a href="/admin/dashboard">Back</a>
{% endblock %}
