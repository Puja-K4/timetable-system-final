{% extends "base.html" %}
{% block content %}

<div class="card shadow p-4">
    <h3 class="mb-3">Manage Departments</h3>

    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-8">
            <label class="form-label">Department Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter department name" required>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Add Department</button>
        </div>
    </form>

    {% if data %}
    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-primary">
                <tr>
                    <th style="width: 80px;">#</th>
                    <th>Department Name</th>
                </tr>
            </thead>
            <tbody>
                {% for d in data %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ d.name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="alert alert-info mb-0">No departments added yet.</div>
    {% endif %}

    <div class="mt-3">
        <a href="/admin/dashboard" class="btn btn-secondary">Back</a>
    </div>
</div>

{% endblock %}
